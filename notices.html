<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notice Board — SR Gold Society</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2420;
    --paper:#F1F4EF;
    --card:#FFFFFF;
    --forest:#1F4D3D;
    --forest-dark:#153529;
    --marigold:#D9A62E;
    --marigold-soft:#F4E4BC;
    --terracotta:#C1503D;
    --sky:#3E7CB1;
    --line:#DDE3DA;
    --muted:#6B7A70;
    --radius:18px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--paper);
    position:relative;
    padding-bottom:92px;
  }

  /* ===== HEADER ===== */
  .header{
    background:linear-gradient(160deg, var(--forest) 0%, var(--forest-dark) 100%);
    color:#fff;
    padding:22px 20px 34px;
    border-radius:0 0 28px 28px;
    position:relative;
    overflow:hidden;
  }
  .header::after{
    content:"";
    position:absolute;
    right:-40px; top:-40px;
    width:160px; height:160px;
    border:1px dashed rgba(255,255,255,.18);
    border-radius:50%;
  }
  .header-top{
    display:flex;
    align-items:center;
    gap:12px;
    position:relative;
    z-index:1;
  }
  .back-btn{
    width:38px; height:38px;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    text-decoration:none;
  }
  .back-btn svg{width:18px; height:18px; stroke:#fff;}
  .page-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:18px;
  }

  /* ===== CONTENT ===== */
  .content{
    padding:20px 16px;
  }
  .notice-card{
    background:var(--card);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
    border:1px solid var(--line);
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .notice-card:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(21,53,41,.08);
  }
  .notice-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:10px;
  }
  .notice-tag{
    font-size:10px;
    font-weight:600;
    padding:4px 10px;
    border-radius:10px;
    text-transform:uppercase;
    letter-spacing:.3px;
  }
  .tag-urgent{
    background:#F5E1DC;
    color:var(--terracotta);
  }
  .tag-general{
    background:#DEEBF5;
    color:var(--sky);
  }
  .tag-event{
    background:var(--marigold-soft);
    color:#9C7412;
  }
  .notice-date{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
  }
  .delete-btn{
    background:var(--terracotta);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:6px 10px;
    font-size:10px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:4px;
    transition:background .2s;
  }
  .delete-btn:hover{
    background:#a64232;
  }
  .delete-btn svg{
    width:12px;
    height:12px;
    stroke:#fff;
  }
  .notice-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:15px;
    color:var(--forest-dark);
    margin-bottom:6px;
  }
  .notice-preview{
    font-size:13px;
    color:var(--muted);
    line-height:1.5;
  }
  .notice-meta{
    display:flex;
    gap:12px;
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid var(--line);
  }
  .meta-item{
    font-size:11px;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:4px;
  }
  .add-notice-btn{
    background:var(--forest);
    color:#fff;
    border-radius:14px;
    padding:16px;
    text-align:center;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    margin-bottom:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .modal-overlay{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,.5);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
  }
  .modal-overlay.active{display:flex;}
  .modal{
    background:var(--card);
    border-radius:var(--radius);
    width:90%;
    max-width:400px;
    max-height:90vh;
    overflow-y:auto;
    padding:24px;
  }
  .modal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
  }
  .modal-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:18px;
    color:var(--forest-dark);
  }
  .modal-close{
    width:32px; height:32px;
    border-radius:50%;
    background:var(--paper);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .modal-close svg{width:18px; height:18px; stroke:var(--muted);}
  .form-group{
    margin-bottom:16px;
  }
  .form-label{
    font-size:12px;
    font-weight:500;
    color:var(--muted);
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:.3px;
  }
  .form-input, .form-textarea, .form-select{
    width:100%;
    padding:14px 16px;
    border:1px solid var(--line);
    border-radius:12px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    background:var(--paper);
    color:var(--ink);
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus{
    outline:none;
    border-color:var(--forest);
  }
  .form-textarea{
    min-height:100px;
    resize:vertical;
  }
  .modal-btn{
    width:100%;
    padding:16px;
    border-radius:14px;
    border:none;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    margin-top:8px;
  }
  .modal-btn-primary{
    background:linear-gradient(135deg, var(--forest) 0%, var(--forest-dark) 100%);
    color:#fff;
  }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav{
    position:fixed;
    bottom:0; left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:480px;
    background:#FFFFFF;
    border-top:1.5px solid rgba(31,77,61,0.14);
    display:flex;
    justify-content:space-around;
    align-items:center;
    padding:8px 6px 12px;
    z-index:1000;
    box-shadow:0 -8px 24px rgba(31,77,61,0.1);
  }
  .nav-item{
    display:flex; flex-direction:column; align-items:center; gap:3px;
    color:#526056;
    font-size:10.5px;
    font-weight:600;
    cursor:pointer;
    text-decoration:none;
    flex:1;
    padding:6px 2px;
    border-radius:14px;
    transition:all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .nav-item svg{width:20px; height:20px; stroke:#526056; transition:transform 0.2s, stroke 0.2s;}
  .nav-item:active{transform:scale(0.92);}
  .nav-item.active{
    color:#153529;
    font-weight:700;
    background:linear-gradient(135deg, rgba(31,77,61,0.12) 0%, rgba(217,166,46,0.18) 100%);
    box-shadow:0 3px 10px rgba(31,77,61,0.08);
  }
  .nav-item.active svg{stroke:#1F4D3D; transform:translateY(-1px) scale(1.12);}

  @media (min-width:481px){
    body{background:#E9ECE5;}
    .app{margin:24px 0; border-radius:26px; box-shadow:0 24px 60px rgba(21,53,41,.14); overflow:hidden;}
  }
</style>
  <!-- ═══ Firebase SDK (Compat) ═══ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script></head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="page-title" style="flex:1;">Notice Board</div>
      <span id="fbStatusBadge" style="font-size: 9.5px; background: #00E676; color: #033621; padding: 3px 9px; border-radius: 8px; font-weight: 700; letter-spacing: 0.3px; box-shadow: 0 2px 8px rgba(0, 230, 118, 0.4); border: 1px solid #B9F6CA;">🟢 Live</span>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="add-notice-btn" onclick="openModal('addNoticeModal')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add New Notice
    </div>

    <div id="noticesList">
    </div>
  </div>

  <!-- ADD NOTICE MODAL -->
  <div class="modal-overlay" id="addNoticeModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Add New Notice</div>
        <div class="modal-close" onclick="closeModal('addNoticeModal')">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>
      <div class="form-group">
        <div class="form-label">Notice Type</div>
        <select class="form-select" id="noticeType">
          <option value="general">General</option>
          <option value="urgent">Urgent</option>
          <option value="event">Event</option>
        </select>
      </div>
      <div class="form-group">
        <div class="form-label">Title</div>
        <input type="text" class="form-input" id="noticeTitle" placeholder="Enter notice title">
      </div>
      <div class="form-group">
        <div class="form-label">Description</div>
        <textarea class="form-textarea" id="noticeDescription" placeholder="Enter notice details..."></textarea>
      </div>
      <button class="modal-btn modal-btn-primary" onclick="addNotice()">Publish Notice</button>
    </div>
  </div>

  <!-- VIEW NOTICE MODAL -->
  <div class="modal-overlay" id="viewNoticeModal">
    <div class="modal" style="border: 2px solid var(--forest); box-shadow: 0 10px 40px rgba(31,77,61,0.15);">
      <div class="modal-header">
        <div class="modal-title" id="viewModalTitle">Notice Detail</div>
        <div class="modal-close" onclick="closeModal('viewNoticeModal')">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <span id="viewModalTag" class="notice-tag tag-general">General</span>
        <span id="viewModalDate" class="notice-date">Jul 20, 2026</span>
      </div>
      <div id="viewModalDesc" style="font-size:13.5px; line-height:1.6; color:var(--ink); margin-bottom:20px; white-space:pre-wrap;">
        Notice description goes here...
      </div>
      <div style="font-size:11px; color:var(--muted); display:flex; gap:12px; border-top:1px solid var(--line); padding-top:12px; justify-content:space-between; align-items:center;">
        <span id="viewModalAuthor">By Committee</span>
        <span id="viewModalViews">0 views</span>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <a href="index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="complaints.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      Complaints
    </a>
    <a href="notices.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Notices
    </a>
    <a href="feed.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Feed
    </a>
    <a href="profile.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </div>

</div>

<script>
  // Auth control
  let currentUser = JSON.parse(localStorage.getItem('currentUser'));
  if (!currentUser) {
    window.location.href = 'profile.html';
  }

  function openModal(modalId) {
    document.getElementById(modalId).classList.add('active');
  }

  function closeModal(modalId) {
    document.getElementById(modalId).classList.remove('active');
  }

  // Load notices database
  let notices = [];
  let isListeningNotices = false;

  function initNotices() {
    if (typeof fbListen === 'function') {
      if (!isListeningNotices) {
        isListeningNotices = true;
        fbListen('society_notices', (data) => {
          notices = data || [];
          localStorage.setItem('society_notices', JSON.stringify(notices));
          renderNoticesList();
        });
      }
    } else {
      notices = JSON.parse(localStorage.getItem('society_notices')) || [];
      renderNoticesList();
    }
  }

  function renderNoticesList() {
    const listContainer = document.getElementById('noticesList');
    listContainer.innerHTML = '';

    const isAdmin = currentUser && (currentUser.role === 'Super Admin' || currentUser.role === 'Committee Member');

    notices.forEach((n, idx) => {
      const tagClass = n.type === 'urgent' ? 'tag-urgent' : n.type === 'event' ? 'tag-event' : 'tag-general';
      const tagLabel = n.type.charAt(0).toUpperCase() + n.type.slice(1);
      
      const card = document.createElement('div');
      card.className = 'notice-card';
      card.innerHTML = `
        <div class="notice-header">
          <div style="display:flex; gap:8px; align-items:center;">
            <span class="notice-tag ${tagClass}">${tagLabel}</span>
            ${isAdmin ? `<button class="delete-btn" onclick="event.stopPropagation(); deleteNotice(${idx})">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              Delete
            </button>` : ''}
          </div>
          <span class="notice-date">${n.date}</span>
        </div>
        <div class="notice-title" style="cursor:pointer;" onclick="viewNoticeDetail(${idx})">${n.title}</div>
        <div class="notice-preview">${n.desc.substring(0, 100)}${n.desc.length > 100 ? '...' : ''}</div>
        <div class="notice-meta">
          <div class="meta-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            ${n.author}
          </div>
          <div class="meta-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            ${n.views} views
          </div>
        </div>
      `;
      listContainer.appendChild(card);
    });
  }

  function addNotice() {
    const type = document.getElementById('noticeType').value;
    const title = document.getElementById('noticeTitle').value.trim();
    const description = document.getElementById('noticeDescription').value.trim();
    
    if (!title) {
      alert('Please enter a title');
      return;
    }
    if (!description) {
      alert('Please enter a description');
      return;
    }

    const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    const newNotice = {
      type: type,
      title: title,
      desc: description,
      date: today,
      author: currentUser.role || 'Resident',
      views: 0
    };

    notices.unshift(newNotice);
    
    // Log the notice creation
    logAction('notice_created', { 
      title: title, 
      type: type, 
      author: currentUser.role || 'Resident' 
    }, 'notices');
    if (typeof logActivity === 'function') {
      logActivity(`Notice Board (${title})`, 'Added');
    }
    
    if (typeof fbSet === 'function') {
      fbSet('society_notices', notices).then(() => {
        if (typeof pushNotification === 'function') {
          pushNotification(`New Notice published: ${title}`, "notice");
        }
        alert('Notice published successfully!');
      });
    } else {
      localStorage.setItem('society_notices', JSON.stringify(notices));
      if (typeof pushNotification === 'function') {
        pushNotification(`New Notice published: ${title}`, "notice");
      }
      alert('Notice published successfully!');
    }

    // Reset form
    document.getElementById('noticeTitle').value = '';
    document.getElementById('noticeDescription').value = '';
    document.getElementById('noticeType').value = 'general';
    
    closeModal('addNoticeModal');
  }

  function viewNoticeDetail(idx) {
    const n = notices[idx];
    n.views = (n.views || 0) + 1;
    
    if (typeof fbSet === 'function') {
      fbSet('society_notices', notices);
    } else {
      localStorage.setItem('society_notices', JSON.stringify(notices));
      renderNoticesList();
    }

    const tagClass = n.type === 'urgent' ? 'tag-urgent' : n.type === 'event' ? 'tag-event' : 'tag-general';
    const tagLabel = n.type.charAt(0).toUpperCase() + n.type.slice(1);

    document.getElementById('viewModalTitle').textContent = n.title;
    document.getElementById('viewModalDesc').textContent = n.desc;
    
    const tagSpan = document.getElementById('viewModalTag');
    tagSpan.className = `notice-tag ${tagClass}`;
    tagSpan.textContent = tagLabel;
    
    document.getElementById('viewModalDate').textContent = n.date;
    document.getElementById('viewModalAuthor').textContent = `By ${n.author}`;
    document.getElementById('viewModalViews').textContent = `${n.views} views`;

    openModal('viewNoticeModal');
  }

  function deleteNotice(idx) {
    if (!confirm('Are you sure you want to delete this notice? This action cannot be undone.')) return;

    // Check admin permission
    if (!currentUser || (currentUser.role !== 'Super Admin' && currentUser.role !== 'Committee Member')) {
      alert('You do not have permission to delete notices.');
      return;
    }

    // Get notice details before deletion for logging
    const noticeToDelete = notices[idx];

    // Remove from notices array
    notices.splice(idx, 1);
    
    if (typeof logActivity === 'function') {
      logActivity(`Notice Board (${noticeToDelete ? noticeToDelete.title : idx})`, 'Deleted');
    }

    if (typeof fbSet === 'function') {
      fbSet('society_notices', notices).then(() => {
        // Log deletion details
        logDeletion('notice', noticeToDelete.title, noticeToDelete);
      });
    } else {
      localStorage.setItem('society_notices', JSON.stringify(notices));
      logDeletion('notice', noticeToDelete.title, noticeToDelete);
      renderNoticesList();
    }
    
    // Show success feedback
    alert('Notice deleted successfully.');
  }

  function logDeletion(type, id, details) {
    const deletionLogs = JSON.parse(localStorage.getItem('deletion_logs') || '[]');
    
    const logEntry = {
      id: Date.now(),
      type: type,
      itemId: id,
      details: details,
      deletedBy: currentUser.name,
      deletedByRole: currentUser.role,
      deletedByFlat: currentUser.flat,
      timestamp: new Date().toISOString(),
      timestampFormatted: new Date().toLocaleString('en-IN', { 
        dateStyle: 'medium', 
        timeStyle: 'short' 
      })
    };
    
    deletionLogs.unshift(logEntry);
    localStorage.setItem('deletion_logs', JSON.stringify(deletionLogs));
  }

  function logAction(actionType, details, category = 'general') {
    const actionLogs = JSON.parse(localStorage.getItem('action_logs') || '[]');
    
    const logEntry = {
      id: Date.now(),
      actionType: actionType,
      category: category,
      details: details,
      performedBy: currentUser.name,
      performedByRole: currentUser.role,
      performedByFlat: currentUser.flat,
      performedByEmail: currentUser.email,
      timestamp: new Date().toISOString(),
      timestampFormatted: new Date().toLocaleString('en-IN', { 
        dateStyle: 'medium', 
        timeStyle: 'short' 
      })
    };
    
    actionLogs.unshift(logEntry);
    
    // Keep only last 1000 logs to prevent storage issues
    if (actionLogs.length > 1000) {
      actionLogs = actionLogs.slice(0, 1000);
    }
    
    localStorage.setItem('action_logs', JSON.stringify(actionLogs));
  }

  // Close modals clicking outside
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        overlay.classList.remove('active');
      }
    });
  });

  // Initial load
  initNotices();
</script>
</body>
</html>
