<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — SR Gold Society</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2420; --paper:#F1F4EF; --card:#FFFFFF;
    --forest:#1F4D3D; --forest-dark:#153529;
    --marigold:#D9A62E; --marigold-soft:#F4E4BC;
    --terracotta:#C1503D; --sky:#3E7CB1;
    --line:#DDE3DA; --muted:#6B7A70; --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;display:flex;justify-content:center;min-height:100vh;}
  .app{width:100%;max-width:480px;min-height:100vh;background:var(--paper);position:relative;display:flex;flex-direction:column;}

  /* ── HEADER ── */
  .header{background:linear-gradient(160deg,var(--forest) 0%,var(--forest-dark) 100%);color:#fff;padding:20px 20px 28px;border-radius:0 0 24px 24px;position:relative;overflow:hidden;flex-shrink:0;}
  .header::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border:1px dashed rgba(255,255,255,.18);border-radius:50%;}
  .header-top{display:flex;align-items:center;gap:12px;position:relative;z-index:1;}
  .back-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;}
  .back-btn svg{width:16px;height:16px;stroke:#fff;}
  .page-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;flex:1;}

  /* ── TABS ── */
  .tab-row{display:flex;gap:0;padding:16px 16px 0;flex-shrink:0;}
  .tab-btn{flex:1;padding:10px 8px;border:none;background:transparent;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;}
  .tab-btn.active{color:var(--forest);border-bottom-color:var(--forest);}

  /* ── CHAT LIST ── */
  .content{flex:1;overflow-y:auto;padding:14px 14px 90px;}
  .section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:14px 2px 8px;}
  .chat-item{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--line);display:flex;gap:12px;cursor:pointer;transition:transform .15s,box-shadow .15s;margin-bottom:8px;position:relative;}
  .chat-item:active{transform:scale(.98);}
  .chat-item:hover{box-shadow:0 6px 18px rgba(21,53,41,.08);}
  .avatar{width:46px;height:46px;border-radius:50%;background:var(--forest);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;flex-shrink:0;}
  .avatar.group{background:var(--sky);}
  .avatar.flat{background:linear-gradient(135deg,var(--marigold),#b8891a);color:var(--forest-dark);}
  .chat-info{flex:1;min-width:0;}
  .chat-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:var(--forest-dark);}
  .chat-preview{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;}
  .chat-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
  .chat-time{font-size:11px;color:var(--muted);}
  .unread-badge{background:var(--terracotta);color:#fff;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:10px;min-width:20px;text-align:center;flex-shrink:0;}
  .member-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
  .member-chip{font-size:10px;background:#E4EEE8;color:var(--forest);padding:2px 7px;border-radius:6px;font-weight:600;}

  /* ── FAB ── */
  .fab{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--forest),var(--forest-dark));color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 6px 22px rgba(21,53,41,.3);display:flex;align-items:center;justify-content:center;z-index:50;transition:transform .2s;}
  .fab:active{transform:scale(.92);}

  /* ── FULL-SCREEN CHAT WINDOW ── */
  .chat-window{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:100%;background:var(--paper);z-index:200;display:none;flex-direction:column;}
  .cw-header{background:linear-gradient(160deg,var(--forest),var(--forest-dark));color:#fff;padding:16px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .cw-back{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;}
  .cw-back svg{width:15px;height:15px;stroke:#fff;}
  .cw-avatar{width:38px;height:38px;border-radius:50%;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .cw-info{flex:1;min-width:0;}
  .cw-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cw-sub{font-size:10.5px;color:rgba(255,255,255,.65);margin-top:1px;}
  .cw-more{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;}
  .cw-more svg{width:16px;height:16px;stroke:#fff;}
  .cw-stream{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px;background:var(--paper);}
  .chat-bubble{max-width:78%;padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.45;word-break:break-word;}
  .chat-bubble.sent{background:var(--forest);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
  .chat-bubble.received{background:var(--card);color:var(--ink);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--line);}
  .bubble-sender{font-size:10px;font-weight:700;color:var(--marigold);margin-bottom:3px;}
  .bubble-time{font-size:9.5px;margin-top:4px;text-align:right;opacity:.7;}
  .cw-input-bar{padding:10px 12px;background:var(--card);border-top:1px solid var(--line);display:flex;gap:8px;align-items:center;flex-shrink:0;}
  .cw-input{flex:1;padding:11px 16px;border:1.5px solid var(--line);border-radius:22px;font-family:'Inter',sans-serif;font-size:13.5px;background:var(--paper);color:var(--ink);outline:none;}
  .cw-input:focus{border-color:var(--forest);}
  .cw-send{width:42px;height:42px;border-radius:50%;background:var(--forest);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .15s;}
  .cw-send:active{transform:scale(.9);}
  .cw-send svg{width:16px;height:16px;stroke:#fff;margin-left:2px;}
  .typing-row{padding:0 16px 8px;font-size:12px;color:var(--muted);font-style:italic;display:none;}

  /* ── MODALS ── */
  .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:400;}
  .modal-overlay.active{display:flex;}
  .modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px 20px;max-height:90vh;overflow-y:auto;}
  .modal-handle{width:40px;height:4px;background:var(--line);border-radius:4px;margin:0 auto 20px;}
  .modal-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:var(--forest-dark);margin-bottom:18px;}
  .form-group{margin-bottom:14px;}
  .form-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px;display:block;}
  .form-input,.form-select{width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:12px;font-family:'Inter',sans-serif;font-size:14px;background:var(--paper);color:var(--ink);outline:none;}
  .form-input:focus,.form-select:focus{border-color:var(--forest);}
  .member-list-modal{display:flex;flex-direction:column;gap:8px;max-height:240px;overflow-y:auto;margin-top:6px;}
  .member-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--paper);border-radius:10px;border:1px solid var(--line);}
  .member-row-avatar{width:36px;height:36px;border-radius:50%;background:var(--forest);color:#fff;font-size:12px;font-weight:700;font-family:'Space Grotesk',sans-serif;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .member-row-info{flex:1;min-width:0;}
  .member-row-name{font-weight:600;font-size:13px;color:var(--forest-dark);}
  .member-row-flat{font-size:11px;color:var(--muted);}
  .btn-primary{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--forest),var(--forest-dark));color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;cursor:pointer;margin-top:6px;}
  .btn-danger{padding:6px 12px;border-radius:8px;border:none;background:var(--terracotta);color:#fff;font-size:11px;font-weight:700;cursor:pointer;}
  .btn-outline{padding:6px 12px;border-radius:8px;border:1.5px solid var(--forest);background:transparent;color:var(--forest);font-size:11px;font-weight:700;cursor:pointer;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
  .empty-state-icon{font-size:42px;margin-bottom:10px;}

  /* ── GROUP SETTINGS PANEL ── */
  .settings-panel{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:100%;background:var(--paper);z-index:300;display:none;flex-direction:column;}
  .sp-header{background:linear-gradient(160deg,var(--forest),var(--forest-dark));padding:16px 14px;display:flex;align-items:center;gap:10px;color:#fff;}
  .sp-content{flex:1;overflow-y:auto;padding:16px;}

  /* ── BOTTOM NAV ── */
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:10px 6px 14px;z-index:100;}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);font-size:10px;font-weight:500;cursor:pointer;text-decoration:none;}
  .nav-item svg{width:19px;height:19px;stroke:var(--muted);}
  .nav-item.active{color:var(--forest);}
  .nav-item.active svg{stroke:var(--forest);}
  @media(min-width:481px){body{background:#E9ECE5;}.app{margin:24px 0;border-radius:26px;box-shadow:0 24px 60px rgba(21,53,41,.14);overflow:hidden;}.fab{right:calc(50% - 240px);}.chat-window,.settings-panel{border-radius:26px;overflow:hidden;}}
</style>
  <!-- ═══ Firebase SDK (Compat) ═══ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script></head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="page-title">💬 Society Chat</div>
      <span id="fbStatusBadge" style="font-size:10px;background:rgba(255,255,255,.15);padding:3px 9px;border-radius:8px;font-weight:600;">● Live</span>
    </div>
  </div>

  <!-- TABS -->
  <div class="tab-row">
    <button class="tab-btn active" id="tabIndividual" onclick="switchTab('individual')">Individual</button>
    <button class="tab-btn" id="tabGroup" onclick="switchTab('group')">Groups</button>
    <button class="tab-btn" id="tabSMS" onclick="switchTab('sms')">SMS Log</button>
  </div>

  <!-- CONTENT -->
  <div class="content" id="mainContent">
    <!-- dynamically filled -->
  </div>

  <!-- FAB: New Chat / New Group -->
  <button class="fab" id="fabBtn" onclick="onFabClick()" title="New chat">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <a href="index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="complaints.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      Complaints
    </a>
    <a href="notices.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Notices
    </a>
    <a href="chat.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Chat
    </a>
    <a href="profile.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </div>

</div>

<!-- ════════════ FULL-SCREEN CHAT WINDOW ════════════ -->
<div class="chat-window" id="chatWindow">
  <div class="cw-header">
    <button class="cw-back" onclick="closeChatWindow()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="cw-avatar" id="cwAvatar" style="background:var(--forest);color:#fff;">S</div>
    <div class="cw-info">
      <div class="cw-name" id="cwName">Chat</div>
      <div class="cw-sub" id="cwSub">Online</div>
    </div>
    <button class="cw-more" id="cwMoreBtn" onclick="openGroupSettings()" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </button>
  </div>
  <div class="cw-stream" id="cwStream"></div>
  <div class="typing-row" id="typingRow">typing…</div>
  <div class="cw-input-bar">
    <input class="cw-input" id="cwInput" placeholder="Type a message…" onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="cw-send" onclick="sendMsg()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<!-- ════════════ GROUP SETTINGS PANEL ════════════ -->
<div class="settings-panel" id="settingsPanel">
  <div class="sp-header">
    <button class="cw-back" onclick="closeGroupSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </button>
    <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;">Group Info</div>
  </div>
  <div class="sp-content" id="settingsContent"></div>
</div>

<!-- ════════════ MODAL: New Individual Chat ════════════ -->
<div class="modal-overlay" id="modalIndividual">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">💬 New Individual Chat</div>
    
    <div class="form-group">
      <label class="form-label">Search Resident (Name, Phone, Email, or Flat)</label>
      <input class="form-input" id="indSearchVal" placeholder="Type name, phone, email or flat..." oninput="searchResident()">
    </div>
    
    <!-- Real-time search results list -->
    <div id="indSearchResults" style="max-height: 180px; overflow-y: auto; margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px;">
      <!-- Populated dynamically -->
    </div>
    
    <!-- Selected user preview -->
    <div id="selectedUserPreview" style="display:none; background:#E4EEE8; border-radius:12px; padding:12px; border:1px solid var(--line); margin-bottom:14px;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:2px;">Selected Resident</div>
      <div id="selectedUserName" style="font-weight:700;font-size:14px;color:var(--forest-dark);"></div>
      <div id="selectedUserFlat" style="font-size:12px;color:var(--muted);"></div>
    </div>
    
    <div class="form-group">
      <label class="form-label">First Message</label>
      <input class="form-input" id="indFirstMsg" placeholder="Type your message…">
    </div>
    
    <button class="btn-primary" onclick="startIndividualChat()">Start Chat</button>
    <button onclick="closeModal('modalIndividual')" style="width:100%;padding:12px;border:none;background:transparent;color:var(--muted);font-size:14px;cursor:pointer;margin-top:6px;">Cancel</button>
  </div>
</div>

<!-- ════════════ MODAL: New Group ════════════ -->
<div class="modal-overlay" id="modalGroup">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">👥 Create New Group</div>
    <div class="form-group">
      <label class="form-label">Group Name</label>
      <input class="form-input" id="grpName" placeholder="e.g. Tower B Residents, Party Planners…">
    </div>
    <div class="form-group">
      <label class="form-label">Add Members</label>
      <input class="form-input" id="grpMemberSearch" placeholder="Filter by name, phone, email, flat..." oninput="filterGroupMemberPicker()" style="margin-bottom: 8px;">
      <div class="member-list-modal" id="grpMemberPickList">
        <!-- populated from society_users -->
      </div>
    </div>
    <button class="btn-primary" onclick="createGroup()">Create Group</button>
    <button onclick="closeModal('modalGroup')" style="width:100%;padding:12px;border:none;background:transparent;color:var(--muted);font-size:14px;cursor:pointer;margin-top:6px;">Cancel</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  BOOTSTRAP
// ══════════════════════════════════════════════
let currentUser = JSON.parse(localStorage.getItem('currentUser'));
if (!currentUser) { 
  window.location.href = 'profile.html';
}

// ── sample flat directory (used when society_users is empty) ──
const sampleUsers = [];

let allUsers = JSON.parse(localStorage.getItem('society_users')) || sampleUsers;

// ── Firebase Listener for Users ──
if (typeof fbListen === 'function') {
  fbListen('society_users', (data) => {
    if (data && data.length > 0) {
      allUsers = data;
    } else {
      allUsers = sampleUsers;
    }
    // Re-populate active lists if needed
    if (document.getElementById('modalGroup').classList.contains('active')) {
      populateGroupMemberPicker();
    }
    if (document.getElementById('settingsPanel').style.display === 'flex') {
      openGroupSettings();
    }
  });
}

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentTab    = 'individual';
let activeThreadId = null;
let threads        = {};   // local mirror of Firebase /chat_threads
let unsub          = null; // Firebase listener unsubscribe

// ══════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabIndividual').classList.toggle('active', tab === 'individual');
  document.getElementById('tabGroup').classList.toggle('active',      tab === 'group');
  document.getElementById('tabSMS').classList.toggle('active',        tab === 'sms');
  
  // Hide FAB for SMS tab
  document.getElementById('fabBtn').style.display = tab === 'sms' ? 'none' : 'flex';
  
  if (tab === 'sms') {
    renderSMSLog();
  } else {
    renderChatList();
  }
}

function onFabClick() {
  if (currentTab === 'individual') {
    document.getElementById('indSearchVal').value = '';
    document.getElementById('indSearchResults').innerHTML = '';
    document.getElementById('selectedUserPreview').style.display = 'none';
    document.getElementById('indFirstMsg').value = '';
    selectedUser = null;
    openModal('modalIndividual');
  } else { 
    populateGroupMemberPicker(); 
    openModal('modalGroup'); 
  }
}

// ══════════════════════════════════════════════
//  MODAL HELPERS
// ══════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('active');    }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// ══════════════════════════════════════════════
//  THREAD HELPERS
// ══════════════════════════════════════════════
function myFlatKey()  { return `flat_${currentUser.flat}`; }

/** Individual thread id: sorted pair of flat numbers */
function indThreadId(flatA, flatB) {
  return ['flat_' + flatA, 'flat_' + flatB].sort().join('__');
}

/** Return display name for a thread from the perspective of currentUser */
function threadDisplayName(t) {
  if (t.type === 'group') return t.name || 'Group';
  // individual: show other party
  const other = (t.members || []).find(m => String(m.flat) !== String(currentUser.flat));
  return other ? `Flat ${other.flat} · ${other.name}` : t.name || 'Chat';
}

function threadAvatarText(t) {
  if (t.type === 'group') return (t.name||'G').substring(0,2).toUpperCase();
  const other = (t.members||[]).find(m=>String(m.flat)!==String(currentUser.flat));
  return other ? `F${other.flat}` : 'CH';
}

function isThreadMine(t) {
  if (!t.members) return false;
  return t.members.some(m => String(m.flat) === String(currentUser.flat));
}

function lastMsg(t) {
  const msgs = t.messages ? Object.values(t.messages) : [];
  return msgs.length ? msgs[msgs.length - 1] : null;
}

// ══════════════════════════════════════════════
//  RENDER CHAT LIST
// ══════════════════════════════════════════════
function renderChatList() {
  const el = document.getElementById('mainContent');
  el.innerHTML = '';

  const myThreads = Object.entries(threads).filter(([id, t]) =>
    t.type === currentTab && isThreadMine(t)
  );

  if (myThreads.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">${currentTab==='individual'?'💬':'👥'}</div>
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;margin-bottom:6px;">No ${currentTab} chats yet</div>
      <div style="font-size:13px;">Tap <strong>+</strong> to start ${currentTab==='individual'?'a flat-to-flat chat':'a group'}</div>
    </div>`;
    return;
  }

  // Sort by last message time desc
  myThreads.sort(([,a],[,b]) => {
    const ta = lastMsg(a)?.timestamp || 0;
    const tb = lastMsg(b)?.timestamp || 0;
    return tb - ta;
  });

  myThreads.forEach(([tid, t]) => {
    const displayName = threadDisplayName(t);
    const avatarText  = threadAvatarText(t);
    const lm          = lastMsg(t);
    const membersList = t.type === 'group' ? (t.members||[]).map(m=>`Flat ${m.flat}`).join(', ') : '';

    const avatarClass = t.type === 'group' ? 'group' : 'flat';
    const timeLabel   = lm ? fmtTime(lm.timestamp) : '';
    const preview     = lm ? lm.text : 'Start chatting…';

    const card = document.createElement('div');
    card.className = 'chat-item';
    card.onclick = () => openChat(tid);
    card.innerHTML = `
      <div class="avatar ${avatarClass}">${avatarText}</div>
      <div class="chat-info">
        <div class="chat-meta">
          <div class="chat-name">${displayName}</div>
          <div class="chat-time">${timeLabel}</div>
        </div>
        <div class="chat-preview">${escHtml(preview)}</div>
        ${t.type==='group' && membersList ? `<div style="font-size:10px;color:var(--muted);margin-top:3px;">👥 ${membersList}</div>` : ''}
      </div>
    `;
    el.appendChild(card);
  });
}

// ══════════════════════════════════════════════
//  FIREBASE LISTENER — load all threads
// ══════════════════════════════════════════════
function startThreadsListener() {
  if (unsub) unsub();
  
  let firebaseActive = false;
  try {
    if (typeof firebase !== 'undefined' && firebase.database) {
      const ref = firebase.database().ref('/chat_threads');
      ref.on('value', snap => {
        threads = snap.val() || {};
        renderChatList();
        if (activeThreadId && threads[activeThreadId]) {
          renderMessages();
        }
      });
      unsub = () => ref.off('value');
      firebaseActive = true;
    }
  } catch(e) {
    console.warn("Firebase RTDB not available for chat threads:", e.message);
  }

  if (!firebaseActive) {
    // Local storage fallback listener simulation
    const loadLocalThreads = () => {
      threads = JSON.parse(localStorage.getItem('society_chat_threads')) || {};
      renderChatList();
      if (activeThreadId && threads[activeThreadId]) {
        renderMessages();
      }
    };
    loadLocalThreads();
    
    // Listen to changes in local storage from other tabs
    window.addEventListener('storage', (e) => {
      if (e.key === 'society_chat_threads') {
        loadLocalThreads();
      }
    });
    
    // Poll every 1.5 seconds for instant local updates across tabs
    const intervalId = setInterval(loadLocalThreads, 1500);
    unsub = () => clearInterval(intervalId);
  }
}

// ══════════════════════════════════════════════
//  OPEN / CLOSE CHAT
// ══════════════════════════════════════════════
function openChat(tid) {
  activeThreadId = tid;
  const t = threads[tid] || {};
  const displayName = threadDisplayName(t);
  const avatarText  = threadAvatarText(t);

  const cw = document.getElementById('chatWindow');
  document.getElementById('cwName').textContent    = displayName;
  document.getElementById('cwSub').textContent     = t.type === 'group'
    ? `${(t.members||[]).length} members` : `Flat ${t.members?.find(m=>String(m.flat)!==String(currentUser.flat))?.flat||''}`;

  const av = document.getElementById('cwAvatar');
  av.textContent = avatarText;
  av.style.background = t.type === 'group' ? 'var(--sky)' : 'linear-gradient(135deg,var(--marigold),#b8891a)';
  av.style.color       = t.type === 'group' ? '#fff' : 'var(--forest-dark)';

  document.getElementById('cwMoreBtn').style.display = t.type === 'group' ? 'flex' : 'none';

  cw.style.display = 'flex';
  renderMessages();
}

function closeChatWindow() {
  document.getElementById('chatWindow').style.display = 'none';
  activeThreadId = null;
}

// ══════════════════════════════════════════════
//  RENDER MESSAGES
// ══════════════════════════════════════════════
function renderMessages() {
  const stream = document.getElementById('cwStream');
  const t = threads[activeThreadId];
  if (!t) return;

  const msgs = t.messages ? Object.values(t.messages) : [];
  msgs.sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));

  stream.innerHTML = '';

  if (msgs.length === 0) {
    stream.innerHTML = `<div style="text-align:center;color:var(--muted);font-size:13px;margin-top:40px;">👋 Say hello!</div>`;
    return;
  }

  msgs.forEach(m => {
    const isMe = String(m.senderFlat) === String(currentUser.flat);
    const bubble = document.createElement('div');
    bubble.className = `chat-bubble ${isMe ? 'sent' : 'received'}`;
    const showSender = !isMe && t.type === 'group';
    bubble.innerHTML = `
      ${showSender ? `<div class="bubble-sender">Flat ${m.senderFlat} · ${m.senderName}</div>` : ''}
      <div>${escHtml(m.text)}</div>
      <div class="bubble-time">${fmtTime(m.timestamp)}</div>
    `;
    stream.appendChild(bubble);
  });

  stream.scrollTop = stream.scrollHeight;
}

// ══════════════════════════════════════════════
//  SEND MESSAGE
// ══════════════════════════════════════════════
function sendMsg() {
  const inputEl = document.getElementById('cwInput');
  const text = inputEl.value.trim();
  if (!text || !activeThreadId) return;

  const msg = {
    text: text,
    senderFlat: currentUser.flat,
    senderName: currentUser.name,
    senderEmail: currentUser.email,
    timestamp: Date.now()
  };

  const thread = threads[activeThreadId];
  if (thread) {
    // Send SMS notifications to other members
    const otherMembers = (thread.members || []).filter(m => String(m.flat) !== String(currentUser.flat));
    sendBulkSMSNotifications(otherMembers, currentUser.name, text, thread.type);

    // Also push an in-app system notification for other members
    otherMembers.forEach(member => {
      if (typeof pushNotification === 'function') {
        pushNotification(`New message from Flat ${currentUser.flat} (${currentUser.name}): "${text}"`, "chat");
      }
    });
  }

  let sent = false;
  try {
    if (typeof firebase !== 'undefined' && firebase.database) {
      firebase.database().ref(`/chat_threads/${activeThreadId}/messages`).push(msg).then(() => {
        sent = true;
      }).catch(err => {
        console.warn('Firebase RTDB error, saving message locally:', err.message);
        saveMessageLocally(activeThreadId, msg);
      });
    }
  } catch(e) {
    console.warn('Firebase write crash, saving message locally:', e.message);
  }

  setTimeout(() => {
    if (!sent) {
      saveMessageLocally(activeThreadId, msg);
    }
  }, 150);

  inputEl.value = '';
}

function saveMessageLocally(tid, msg) {
  const localThreads = JSON.parse(localStorage.getItem('society_chat_threads')) || {};
  if (!localThreads[tid]) {
    localThreads[tid] = threads[tid] || { type: 'individual', members: [], messages: {} };
  }
  if (!localThreads[tid].messages) {
    localThreads[tid].messages = {};
  }
  const msgId = 'local_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
  localThreads[tid].messages[msgId] = msg;
  localStorage.setItem('society_chat_threads', JSON.stringify(localThreads));
  threads = localThreads;
  renderChatList();
  if (activeThreadId === tid) {
    renderMessages();
  }
}

// ══════════════════════════════════════════════
//  INDIVIDUAL CHAT — USER SELECTION
// ══════════════════════════════════════════════
let selectedUser = null;

function searchResident() {
  const q = document.getElementById('indSearchVal').value.trim().toLowerCase();
  const resultsDiv = document.getElementById('indSearchResults');
  resultsDiv.innerHTML = '';

  if (!q) {
    return;
  }

  const matches = allUsers.filter(u => {
    if (String(u.flat) === String(currentUser.flat)) return false; // skip self
    
    return String(u.name || '').toLowerCase().includes(q) ||
           String(u.phone || '').toLowerCase().includes(q) ||
           String(u.email || '').toLowerCase().includes(q) ||
           String(u.flat || '').toLowerCase().includes(q);
  });

  if (matches.length === 0) {
    resultsDiv.innerHTML = `<div style="text-align:center;font-size:12.5px;color:var(--muted);padding:10px;">No residents match "${q}"</div>`;
    return;
  }

  matches.forEach(u => {
    const row = document.createElement('div');
    row.className = 'member-row';
    row.id = `indPick_${u.flat}`;
    row.style.cursor = 'pointer';
    row.onclick = () => selectIndividualUser(u, row);
    row.innerHTML = `
      <div class="member-row-avatar">${u.name.substring(0,2).toUpperCase()}</div>
      <div class="member-row-info">
        <div class="member-row-name">${u.name}</div>
        <div class="member-row-flat">Flat ${u.flat} · ${u.tower || 'Tower A'} · ${u.phone || ''}</div>
      </div>
      <input type="radio" name="indUserSelect" id="radio_${u.flat}" style="width:18px;height:18px;accent-color:var(--forest);" onclick="event.stopPropagation(); selectIndividualUser(${JSON.stringify(u).replace(/"/g, '&quot;')}, this.parentNode)">
    `;
    resultsDiv.appendChild(row);
  });
}

function selectIndividualUser(user, row) {
  selectedUser = user;
  
  // Update radio buttons
  document.querySelectorAll('input[name="indUserSelect"]').forEach(radio => {
    radio.checked = false;
  });
  const radio = document.getElementById(`radio_${user.flat}`);
  if (radio) radio.checked = true;

  // Update row styling
  document.querySelectorAll('#indSearchResults .member-row').forEach(r => {
    r.style.background = 'var(--paper)';
  });
  row.style.background = '#E4EEE8';

  // Show selected user preview
  document.getElementById('selectedUserName').textContent = user.name;
  document.getElementById('selectedUserFlat').textContent = `Flat ${user.flat} · ${user.tower || 'Tower A'} · ${user.phone || ''}`;
  document.getElementById('selectedUserPreview').style.display = 'block';
}

function startIndividualChat() {
  const firstMsg = document.getElementById('indFirstMsg').value.trim();

  if (!selectedUser) { alert('Please select a user to chat with.'); return; }
  if (!firstMsg) { alert('Enter a first message.'); return; }

  const tid = indThreadId(currentUser.flat, selectedUser.flat);

  const thread = threads[tid] || {
    type: 'individual',
    name: `Flat ${currentUser.flat} ↔ Flat ${selectedUser.flat}`,
    members: [
      { flat: currentUser.flat, name: currentUser.name, email: currentUser.email, phone: currentUser.phone },
      { flat: selectedUser.flat, name: selectedUser.name, email: selectedUser.email, phone: selectedUser.phone || '' }
    ],
    createdAt: Date.now()
  };

  const msg = { text: firstMsg, senderFlat: currentUser.flat, senderName: currentUser.name, senderEmail: currentUser.email, timestamp: Date.now() };

  // Send SMS Notification
  if (selectedUser.phone) {
    sendSMSNotification(selectedUser.phone, currentUser.name, firstMsg, 'individual');
  }

  // Push In-App System Notification
  if (typeof pushNotification === 'function') {
    pushNotification(`New chat started by Flat ${currentUser.flat} (${currentUser.name}): "${firstMsg}"`, "chat");
  }

  let sent = false;
  try {
    if (typeof firebase !== 'undefined' && firebase.database) {
      const ref = firebase.database().ref(`/chat_threads/${tid}`);
      ref.set({ ...thread, messages: { [Date.now()]: msg } }).then(() => {
        sent = true;
        closeModal('modalIndividual');
        document.getElementById('indFirstMsg').value = '';
        document.getElementById('selectedUserPreview').style.display = 'none';
        selectedUser = null;
        openChat(tid);
      }).catch(err => {
        console.warn('Firebase RTDB error starting chat, saving locally:', err.message);
        saveThreadLocally(tid, thread, msg);
      });
    }
  } catch(e) {
    console.warn('Firebase crash starting chat, saving locally:', e.message);
  }

  setTimeout(() => {
    if (!sent) {
      saveThreadLocally(tid, thread, msg);
      closeModal('modalIndividual');
      document.getElementById('indFirstMsg').value = '';
      document.getElementById('selectedUserPreview').style.display = 'none';
      selectedUser = null;
      openChat(tid);
    }
  }, 150);
}

function saveThreadLocally(tid, thread, firstMsgObj) {
  const localThreads = JSON.parse(localStorage.getItem('society_chat_threads')) || {};
  localThreads[tid] = { ...thread };
  if (!localThreads[tid].messages) {
    localThreads[tid].messages = {};
  }
  if (firstMsgObj) {
    const msgId = 'local_' + Date.now();
    localThreads[tid].messages[msgId] = firstMsgObj;
  }
  localStorage.setItem('society_chat_threads', JSON.stringify(localThreads));
  threads = localThreads;
  renderChatList();
}

// ══════════════════════════════════════════════
//  GROUP CHAT — CREATE
// ══════════════════════════════════════════════
let selectedGroupMembers = new Set(); // flat numbers

function populateGroupMemberPicker() {
  selectedGroupMembers.clear();
  const el = document.getElementById('grpMemberPickList');
  el.innerHTML = '';
  const searchInput = document.getElementById('grpMemberSearch');
  if (searchInput) searchInput.value = '';

  allUsers.forEach(u => {
    if (String(u.flat) === String(currentUser.flat)) return; // skip self

    const row = document.createElement('div');
    row.className = 'member-row';
    row.id = `pick_${u.flat}`;
    row.style.cursor = 'pointer';
    row.setAttribute('data-search', `${u.phone || ''} ${u.email || ''}`.toLowerCase());
    row.onclick = () => toggleGroupMember(u.flat, u.name, row);
    row.innerHTML = `
      <div class="member-row-avatar">${u.name.substring(0,2).toUpperCase()}</div>
      <div class="member-row-info">
        <div class="member-row-name">${u.name}</div>
        <div class="member-row-flat">Flat ${u.flat} · ${u.phone || ''}</div>
      </div>
      <input type="checkbox" id="chk_${u.flat}" style="width:18px;height:18px;accent-color:var(--forest);" onclick="event.stopPropagation(); toggleGroupMember('${u.flat}','${u.name}',document.getElementById('pick_${u.flat}'))">
    `;
    el.appendChild(row);
  });
}

function filterGroupMemberPicker() {
  const q = document.getElementById('grpMemberSearch').value.trim().toLowerCase();
  const rows = document.querySelectorAll('#grpMemberPickList .member-row');
  
  rows.forEach(row => {
    const name = row.querySelector('.member-row-name').textContent.toLowerCase();
    const flat = row.querySelector('.member-row-flat').textContent.toLowerCase();
    const searchStr = row.getAttribute('data-search') || '';
    
    if (name.includes(q) || flat.includes(q) || searchStr.includes(q)) {
      row.style.display = 'flex';
    } else {
      row.style.display = 'none';
    }
  });
}

function toggleGroupMember(flat, name, row) {
  const chk = document.getElementById(`chk_${flat}`);
  if (selectedGroupMembers.has(String(flat))) {
    selectedGroupMembers.delete(String(flat));
    chk.checked = false;
    row.style.background = 'var(--paper)';
  } else {
    selectedGroupMembers.add(String(flat));
    chk.checked = true;
    row.style.background = '#E4EEE8';
  }
}

function createGroup() {
  const name = document.getElementById('grpName').value.trim();
  if (!name) { alert('Enter a group name.'); return; }
  if (selectedGroupMembers.size === 0) { alert('Select at least one member.'); return; }

  const members = [
    { flat: currentUser.flat, name: currentUser.name, email: currentUser.email, phone: currentUser.phone, role: 'admin' }
  ];
  selectedGroupMembers.forEach(flat => {
    const u = allUsers.find(u => String(u.flat) === flat);
    if (u) members.push({ flat: u.flat, name: u.name, email: u.email, phone: u.phone || '', role: 'member' });
  });

  const tid  = 'grp_' + Date.now();
  const thread = {
    type: 'group',
    name: name,
    members: members,
    adminFlat: currentUser.flat,
    createdAt: Date.now(),
    messages: {}
  };

  // Send SMS notifications to all group members
  const otherMembers = members.filter(m => String(m.flat) !== String(currentUser.flat));
  sendBulkSMSNotifications(otherMembers, currentUser.name, `You have been added to group: ${name}`, 'group');

  // Push In-App notifications for all group members
  otherMembers.forEach(member => {
    if (typeof pushNotification === 'function') {
      pushNotification(`You were added to group "${name}" by Flat ${currentUser.flat} (${currentUser.name})`, "notice");
    }
  });

  let sent = false;
  try {
    if (typeof firebase !== 'undefined' && firebase.database) {
      firebase.database().ref(`/chat_threads/${tid}`).set(thread).then(() => {
        sent = true;
        closeModal('modalGroup');
        document.getElementById('grpName').value = '';
        selectedGroupMembers.clear();
        switchTab('group');
        openChat(tid);
      }).catch(err => {
        console.warn('Firebase RTDB error creating group, saving locally:', err.message);
        saveThreadLocally(tid, thread, null);
      });
    }
  } catch(e) {
    console.warn('Firebase crash creating group, saving locally:', e.message);
  }

  setTimeout(() => {
    if (!sent) {
      saveThreadLocally(tid, thread, null);
      closeModal('modalGroup');
      document.getElementById('grpName').value = '';
      selectedGroupMembers.clear();
      switchTab('group');
      openChat(tid);
    }
  }, 150);
}

// ══════════════════════════════════════════════
//  GROUP SETTINGS PANEL
// ══════════════════════════════════════════════
function openGroupSettings() {
  if (!activeThreadId) return;
  const t = threads[activeThreadId];
  if (!t) return;

  const isAdmin = String(t.adminFlat) === String(currentUser.flat);
  const members = t.members || [];

  let html = `
    <div style="text-align:center;margin-bottom:20px;">
      <div class="avatar group" style="width:64px;height:64px;font-size:22px;margin:0 auto 10px;">${(t.name||'G').substring(0,2).toUpperCase()}</div>
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:var(--forest-dark);">${t.name}</div>
      <div style="font-size:12px;color:var(--muted);">${members.length} members · Created ${fmtTime(t.createdAt)}</div>
    </div>

    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px;">Members</div>
    <div id="settingsMemberList" style="display:flex;flex-direction:column;gap:8px;">
  `;

  members.forEach(m => {
    const isAdminMember = String(m.flat) === String(t.adminFlat);
    const isMe = String(m.flat) === String(currentUser.flat);
    html += `
      <div class="member-row">
        <div class="member-row-avatar">${m.name.substring(0,2).toUpperCase()}</div>
        <div class="member-row-info">
          <div class="member-row-name">${m.name} ${isMe ? '(You)' : ''}</div>
          <div class="member-row-flat">Flat ${m.flat} ${isAdminMember ? '· 👑 Admin' : ''}</div>
        </div>
        ${isAdmin && !isMe && !isAdminMember
          ? `<button class="btn-danger" onclick="removeMemberFromGroup('${activeThreadId}','${m.flat}')">Remove</button>`
          : ''}
      </div>`;
  });

  html += `</div>`;

  if (isAdmin) {
    html += `
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:18px 0 6px;">Add Member</div>
      <input class="form-input" id="settingsAddSearch" placeholder="Filter by name, phone, email, flat..." oninput="filterSettingsAddList()" style="margin-bottom: 8px;">
      <div id="settingsAddList" style="display:flex;flex-direction:column;gap:8px;">
    `;
    const memberFlats = new Set(members.map(m => String(m.flat)));
    allUsers.filter(u => !memberFlats.has(String(u.flat))).forEach(u => {
      html += `
        <div class="member-row" data-search="${String(u.phone || '').toLowerCase()} ${String(u.email || '').toLowerCase()}">
          <div class="member-row-avatar">${u.name.substring(0,2).toUpperCase()}</div>
          <div class="member-row-info">
            <div class="member-row-name">${u.name}</div>
            <div class="member-row-flat">Flat ${u.flat} · ${u.phone || ''}</div>
          </div>
          <button class="btn-outline" onclick="addMemberToGroup('${activeThreadId}','${u.flat}','${u.name}','${u.email}')">Add</button>
        </div>`;
    });
    html += `</div>`;
  }

  if (!isAdmin) {
    html += `
      <button onclick="leaveGroup('${activeThreadId}')" style="margin-top:24px;width:100%;padding:14px;border:none;border-radius:12px;background:#f5e1dc;color:var(--terracotta);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;cursor:pointer;">
        🚪 Leave Group
      </button>`;
  }

  document.getElementById('settingsContent').innerHTML = html;
  document.getElementById('settingsPanel').style.display = 'flex';
}

function filterSettingsAddList() {
  const q = document.getElementById('settingsAddSearch').value.trim().toLowerCase();
  const rows = document.querySelectorAll('#settingsAddList .member-row');
  
  rows.forEach(row => {
    const name = row.querySelector('.member-row-name').textContent.toLowerCase();
    const flat = row.querySelector('.member-row-flat').textContent.toLowerCase();
    const searchStr = row.getAttribute('data-search') || '';
    
    if (name.includes(q) || flat.includes(q) || searchStr.includes(q)) {
      row.style.display = 'flex';
    } else {
      row.style.display = 'none';
    }
  });
}

function closeGroupSettings() {
  document.getElementById('settingsPanel').style.display = 'none';
}

function addMemberToGroup(tid, flat, name, email) {
  const t = threads[tid];
  if (!t) return;
  const members = [...(t.members || []), { flat, name, email, role: 'member' }];
  firebase.database().ref(`/chat_threads/${tid}/members`).set(members).then(() => {
    openGroupSettings();
  });
}

function removeMemberFromGroup(tid, flat) {
  if (!confirm(`Remove Flat ${flat} from this group?`)) return;
  const t = threads[tid];
  if (!t) return;
  const members = (t.members || []).filter(m => String(m.flat) !== String(flat));
  firebase.database().ref(`/chat_threads/${tid}/members`).set(members).then(() => {
    openGroupSettings();
  });
}

function leaveGroup(tid) {
  if (!confirm('Leave this group?')) return;
  const t = threads[tid];
  if (!t) return;
  const members = (t.members || []).filter(m => String(m.flat) !== String(currentUser.flat));
  firebase.database().ref(`/chat_threads/${tid}/members`).set(members).then(() => {
    closeGroupSettings();
    closeChatWindow();
  });
}

// ══════════════════════════════════════════════
//  SMS NOTIFICATION SYSTEM
// ══════════════════════════════════════════════
function sendSMSNotification(phone, senderName, message, type) {
  // Store SMS notification in localStorage for demo purposes
  // In production, this would integrate with an SMS API like Twilio
  const smsNotifications = JSON.parse(localStorage.getItem('sms_notifications') || '[]');
  
  const notification = {
    id: Date.now(),
    phone: phone,
    senderName: senderName,
    message: message.substring(0, 100) + (message.length > 100 ? '...' : ''),
    type: type,
    timestamp: Date.now(),
    status: 'pending'
  };
  
  smsNotifications.push(notification);
  localStorage.setItem('sms_notifications', JSON.stringify(smsNotifications));
  
  console.log(`SMS Notification queued for ${phone}: ${notification.message}`);
  
  // In production, you would call your SMS API here
  // Example: fetch('/api/send-sms', { method: 'POST', body: JSON.stringify(notification) });
}

function sendBulkSMSNotifications(members, senderName, message, type) {
  members.forEach(member => {
    if (member.phone && member.phone !== currentUser.phone) {
      sendSMSNotification(member.phone, senderName, message, type);
    }
  });
}

function logAction(actionType, details, category = 'general') {
  const actionLogs = JSON.parse(localStorage.getItem('action_logs') || '[]');
  
  const logEntry = {
    id: Date.now(),
    actionType: actionType,
    category: category,
    details: details,
    performedBy: currentUser.name,
    performedByRole: currentUser.role,
    performedByFlat: currentUser.flat,
    performedByEmail: currentUser.email,
    timestamp: new Date().toISOString(),
    timestampFormatted: new Date().toLocaleString('en-IN', { 
      dateStyle: 'medium', 
      timeStyle: 'short' 
    })
  };
  
  actionLogs.unshift(logEntry);
  
  // Keep only last 1000 logs to prevent storage issues
  if (actionLogs.length > 1000) {
    actionLogs = actionLogs.slice(0, 1000);
  }
  
  localStorage.setItem('action_logs', JSON.stringify(actionLogs));
}

// ══════════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════════
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });
  if (diff < 604800000) {
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    return days[d.getDay()];
  }
  return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short' });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════
//  SEED default threads on first open
// ══════════════════════════════════════════════
async function seedDefaultThreads() {
  try {
    if (typeof firebase !== 'undefined' && firebase.database) {
      const snap = await firebase.database().ref('/chat_threads').once('value');
      if (snap.val()) return; // already has data

      const now = Date.now();
      const defaults = {
        ['flat_201__flat_202']: {
          type:'individual', name:'Flat 201 ↔ Flat 202',
          members:[
            { flat:'201', name:'Sujeet Sharma', email:'sujeet@email.com' },

          ],
          createdAt: now - 86400000,
          messages: {
            a1: { text:'Hi Priya, could you share the electrician contact?', senderFlat:'201', senderName:'Sujeet Sharma', timestamp: now - 86400000 },
            a2: { text:'Sure! Rajesh Electrician: +91 98989 77777', senderFlat:'202', senderName:'Priya Mehta', timestamp: now - 86000000 },

// ── Manual SMS Send UI helpers ──
window.updateSmsRecipientPhone = function() {
  const email = document.getElementById('smsRecipient').value;
  const container = document.getElementById('smsPhoneContainer');
  const input = document.getElementById('smsPhone');
  if (email === 'broadcast') {
    input.value = 'All Residents (Broadcast)';
    container.style.display = 'block';
  } else {
    const target = allUsers.find(u => u.email === email);
    if (target) {
      input.value = target.phone || 'No phone number listed';
      container.style.display = 'block';
    } else {
      container.style.display = 'none';
    }
  }
};

window.sendManualSMS = function() {
  const email = document.getElementById('smsRecipient').value;
  const text = document.getElementById('smsText').value.trim();
  if (!email) { alert('Please select a recipient first.'); return; }
  if (!text) { alert('Please enter message text.'); return; }

  if (email === 'broadcast') {
    if (!confirm('Are you sure you want to broadcast this SMS notification to all residents?')) return;
    
    // Send simulated SMS to all residents
    allUsers.forEach(u => {
      if (String(u.flat) !== String(currentUser.flat)) {
        sendSMSNotification(u.phone || 'N/A', currentUser.name, text, 'sms_broadcast');
      }
    });

    // Push an in-app notice
    if (typeof pushNotification === 'function') {
      pushNotification(`[Broadcast] From Flat ${currentUser.flat} (${currentUser.name}): "${text}"`, "notice");
    }

    alert(`Broadcast SMS delivered successfully to all residents!`);
  } else {
    const target = allUsers.find(u => u.email === email);
    if (!target) { alert('Recipient not found.'); return; }

    // Send the simulated SMS
    sendSMSNotification(target.phone || 'N/A', currentUser.name, text, 'sms');

    // Push an in-app notice
    if (typeof pushNotification === 'function') {
      pushNotification(`[SMS Notification] From Flat ${currentUser.flat} (${currentUser.name}): "${text}"`, "notice");
    }

    alert(`SMS Notification delivered successfully to Flat ${target.flat} (${target.name})!`);
  }
  
  // Clear fields
  document.getElementById('smsRecipient').value = '';
  document.getElementById('smsText').value = '';
  document.getElementById('smsPhoneContainer').style.display = 'none';

  // Rerender logs
  renderSMSLog();
};
